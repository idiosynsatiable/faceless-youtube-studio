services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: faceless
      POSTGRES_PASSWORD: faceless
      POSTGRES_DB: faceless_studio
    ports:
      - "5432:5432"
    volumes:
      - faceless_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://faceless:faceless@postgres:5432/faceless_studio
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_with_secure_local_secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"

volumes:
  faceless_pg_data:
